name: CI - C/C++ Build & Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    name: C/C++ Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release
        continue-on-error: true
      - name: Build
        run: cmake --build build --config Release
        continue-on-error: true
